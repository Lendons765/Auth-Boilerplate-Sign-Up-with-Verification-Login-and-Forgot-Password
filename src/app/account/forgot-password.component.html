<div class="forgot-password-card">
    
    <div *ngIf="error" class="alert alert-danger mb-4" style="color: #ffffff; background-color: #dc3545; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; border: 1px solid #c82333;">
        <strong style="font-weight: 600;">Error:</strong> {{ error }}
    </div>

    <form [formGroup]="form" (ngSubmit)="onSubmit()" (input)="error = ''">
        <div class="mb-4">
            <label class="form-label">Email address</label>
            <input type="text" formControlName="email" class="form-control" [ngClass]="{ 'is-invalid': submitted && f.email.errors }" />
            <div *ngIf="submitted && f.email.errors" class="invalid-feedback">
                <div *ngIf="f.email.errors.required">Email is required</div>
                <div *ngIf="f.email.errors.email">Email is invalid</div>
            </div>
        </div>

        <button type="submit" [disabled]="loading" class="btn btn-primary">
            <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
            Submit
        </button>
        <a routerLink="../login" class="btn btn-link">Cancel</a>
    </form>
</div>
