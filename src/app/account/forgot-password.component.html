<div class="forgot-password-page" style="padding-top: 60px;">
    <div class="forgot-password-card" style="max-width: 450px; margin: 0 auto; background: #0d1117; padding: 30px; border-radius: 12px; border: 1px solid #21262d;">
        
        <h2 class="mb-3" style="color: #ffffff; font-weight: 700; font-size: 24px;">Forgot Password</h2>
        <p style="color: #8b949e; font-size: 14px; margin-bottom: 24px;">Enter your email address and we'll send you instructions to reset your password.</p>

        <div *ngIf="error" class="alert alert-danger mb-4" style="color: #ffffff; background-color: #dc3545; padding: 12px; margin-bottom: 20px; border-radius: 6px; font-size: 14px; border: 1px solid #c82333;">
            <strong style="font-weight: 600;">Error:</strong> {{ error }}
        </div>

        <form [formGroup]="form" (ngSubmit)="onSubmit()" (input)="error = ''">
            <div class="mb-4">
                <label class="form-label" style="color: #c9d1d9; font-weight: 500; margin-bottom: 8px; display: block;">Email address</label>
                <input type="text" formControlName="email" class="form-control" [ngClass]="{ 'is-invalid': submitted && f.email.errors }" style="background-color: #161b22; border: 1px solid #30363d; color: #c9d1d9; border-radius: 6px; padding: 10px 12px;" />
                <div *ngIf="submitted && f.email.errors" class="invalid-feedback" style="color: #f85149; font-size: 12px; margin-top: 4px;">
                    <div *ngIf="f.email.errors.required">Email is required</div>
                    <div *ngIf="f.email.errors.email">Email is invalid</div>
                </div>
            </div>

            <div class="d-flex align-items-center gap-3">
                <button type="submit" [disabled]="loading" class="btn btn-primary" style="background: linear-gradient(135deg, #8a2be2, #4a00e0); border: none; padding: 10px 24px; border-radius: 6px; color: white; font-weight: 600;">
                    <span *ngIf="loading" class="spinner-border spinner-border-sm me-2"></span>
                    Submit
                </button>
                <a routerLink="../login" class="btn btn-link" style="color: #58a6ff; text-decoration: none; font-size: 14px;">Cancel</a>
            </div>
        </form>
    </div>
</div>
